name: WorkGrid CI/CD

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Next.js
      env:
        NEXT_TELEMETRY_DISABLED: 1
        # Mock env vars needed for build if any
        MONGODB_URI: "mongodb://localhost:27017/test"
      run: npm run build
      
    # Note: When Vitest/Cypress are added, test steps go here:
    # - name: Run tests
    #   run: npm run test
